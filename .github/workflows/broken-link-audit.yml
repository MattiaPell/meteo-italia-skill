name: Broken Link Audit

on:
  push:
    branches: [main]
    paths:
      - 'SKILL.md'
      - 'references/**'
  pull_request:
    branches: [main]
    paths:
      - 'SKILL.md'
      - 'references/**'
  schedule:
    # Run weekly on Monday at 06:00 UTC
    - cron: '0 6 * * 1'

jobs:
  broken-link-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract references from SKILL.md
        id: extract
        run: |
          # Extract all references/*.md files mentioned in SKILL.md
          grep -oP 'references/[^)` ]+\.md' SKILL.md | sort -u > /tmp/referenced.txt
          echo "Found $(wc -l < /tmp/referenced.txt) unique references in SKILL.md"
          cat /tmp/referenced.txt

      - name: Verify all referenced files exist
        id: verify
        run: |
          MISSING=""
          while IFS= read -r file; do
            if [ ! -f "$file" ]; then
              MISSING="$MISSING\n❌ MISSING: $file"
            else
              echo "✅ OK: $file ($(wc -l < "$file") lines)"
            fi
          done < /tmp/referenced.txt

          if [ -n "$MISSING" ]; then
            echo "=== BROKEN LINKS FOUND ==="
            echo -e "$MISSING"
            echo ""
            echo "Action required: Either create the missing files or remove the references from SKILL.md"
            exit 1
          else
            echo ""
            echo "=== ALL LINKS VALID ==="
            echo "All $(wc -l < /tmp/referenced.txt) referenced files exist."
          fi

      - name: Check for orphaned reference files
        run: |
          # Find reference files that exist but are not referenced in SKILL.md
          ORPHANED=""
          for file in references/*.md; do
            filename=$(basename "$file")
            if ! grep -q "$filename" SKILL.md; then
              ORPHANED="$ORPHANED\n⚠️ ORPHANED: $file (exists but not referenced in SKILL.md)"
            fi
          done

          if [ -n "$ORPHANED" ]; then
            echo "=== ORPHANED FILES (informational) ==="
            echo -e "$ORPHANED"
            echo ""
            echo "These files exist but are not referenced in SKILL.md."
            echo "Consider adding references or removing unused files."
          else
            echo ""
            echo "=== NO ORPHANED FILES ==="
            echo "All reference files are referenced in SKILL.md."
          fi
